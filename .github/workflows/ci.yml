name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  sqlite:
    name: SQLite runtime
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check:syntax

      - name: Check migrations
        run: npm run db:migrations
        env:
          DATABASE_DRIVER: sqlite

      - name: Start app
        run: |
          PORT=4273 \
          DATABASE_DRIVER=sqlite \
          REQUIRE_AUTH=1 \
          ALLOW_INSECURE_DEV=0 \
          ADMIN_EMAIL=admin@example.local \
          ADMIN_PASSWORD=admin123456 \
          CREDENTIAL_SECRET=ci-secret-at-least-32-characters \
          node --no-warnings server/index.js &
          echo $! > server.pid

      - name: Wait for app
        run: |
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:4273/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Smoke test
        run: npm run test:smoke
        env:
          APP_URL: http://127.0.0.1:4273

      - name: SaaS E2E
        run: npm run test:e2e
        env:
          APP_URL: http://127.0.0.1:4273

      - name: Stop app
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi

  postgres:
    name: PostgreSQL runtime
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pt_resource_hub
          POSTGRES_USER: pt
          POSTGRES_PASSWORD: pt_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pt -d pt_resource_hub"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Check PostgreSQL migrations
        run: npm run db:migrations
        env:
          DATABASE_DRIVER: postgres
          DATABASE_URL: postgres://pt:pt_password@127.0.0.1:5432/pt_resource_hub

      - name: Provision PostgreSQL app role
        run: npm run db:provision-app-role
        env:
          DATABASE_URL: postgres://pt:pt_password@127.0.0.1:5432/pt_resource_hub
          POSTGRES_DB: pt_resource_hub
          POSTGRES_APP_USER: pt_app
          POSTGRES_APP_PASSWORD: pt_app_password

      - name: Enable PostgreSQL RLS
        run: npm run db:rls:enable
        env:
          DATABASE_DRIVER: postgres
          DATABASE_URL: postgres://pt_app:pt_app_password@127.0.0.1:5432/pt_resource_hub
          DATABASE_MIGRATION_URL: postgres://pt:pt_password@127.0.0.1:5432/pt_resource_hub

      - name: RLS E2E
        run: npm run test:rls
        env:
          DATABASE_DRIVER: postgres
          DATABASE_URL: postgres://pt_app:pt_app_password@127.0.0.1:5432/pt_resource_hub
          DATABASE_MIGRATION_URL: postgres://pt:pt_password@127.0.0.1:5432/pt_resource_hub

      - name: Start app with PostgreSQL
        run: |
          PORT=4273 \
          DATABASE_DRIVER=postgres \
          DATABASE_URL=postgres://pt_app:pt_app_password@127.0.0.1:5432/pt_resource_hub \
          DATABASE_MIGRATION_URL=postgres://pt:pt_password@127.0.0.1:5432/pt_resource_hub \
          REQUIRE_AUTH=1 \
          ALLOW_INSECURE_DEV=0 \
          ADMIN_EMAIL=admin@example.local \
          ADMIN_PASSWORD=admin123456 \
          CREDENTIAL_SECRET=ci-secret-at-least-32-characters \
          REDIS_URL=redis://127.0.0.1:6379 \
          PUBLIC_APP_URL=http://127.0.0.1:4273 \
          STRIPE_WEBHOOK_SECRET=whsec_contract_test \
          LEMON_WEBHOOK_SECRET=lemon_contract_test \
          node --no-warnings server/index.js &
          echo $! > server.pid

      - name: Wait for app
        run: |
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:4273/api/health >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          exit 1

      - name: Smoke test
        run: npm run test:smoke
        env:
          APP_URL: http://127.0.0.1:4273

      - name: SaaS E2E
        run: npm run test:e2e
        env:
          APP_URL: http://127.0.0.1:4273

      - name: Payment sandbox contract
        run: npm run test:payment-contract
        env:
          APP_URL: http://127.0.0.1:4273
          STRIPE_WEBHOOK_SECRET: whsec_contract_test
          LEMON_WEBHOOK_SECRET: lemon_contract_test
          PAYMENT_CONTRACT_WORKSPACE_ID: default
          PAYMENT_CONTRACT_PLAN: team

      - name: Worker run once
        run: npm run worker
        env:
          DATABASE_DRIVER: postgres
          DATABASE_URL: postgres://pt_app:pt_app_password@127.0.0.1:5432/pt_resource_hub
          DATABASE_MIGRATION_URL: postgres://pt:pt_password@127.0.0.1:5432/pt_resource_hub
          REDIS_URL: redis://127.0.0.1:6379
          CREDENTIAL_SECRET: ci-secret-at-least-32-characters
          WORKER_RUN_ONCE: "1"

      - name: PostgreSQL backup archive and restore SLA drill
        run: |
          createdb "postgres://pt:pt_password@127.0.0.1:5432/pt_restore"
          BACKUP_FILE="$(
            DATABASE_URL=postgres://pt:pt_password@127.0.0.1:5432/pt_resource_hub \
            PG_BACKUP_DIR=storage/postgres-backups \
            BACKUP_ARCHIVE=1 \
            OBJECT_STORAGE_PROVIDER=file \
            OBJECT_ARCHIVE_DIR=storage/object-archive \
            npm run backup:postgres | tee backup-output.json | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>{const m=s.match(/\\{[\\s\\S]*\\}\\s*$/);process.stdout.write(JSON.parse(m[0]).file)})"
          )"
          RESTORE_DATABASE_URL=postgres://pt:pt_password@127.0.0.1:5432/pt_restore \
          RESTORE_SLA_SECONDS=300 \
          npm run backup:postgres:restore -- "$BACKUP_FILE"

      - name: Backup lifecycle policy dry run
        run: |
          BACKUP_LIFECYCLE_DRY_RUN=1 \
          PG_BACKUP_DIR=storage/postgres-backups \
          OBJECT_ARCHIVE_DIR=storage/object-archive \
          npm run backup:lifecycle

      - name: Production monitoring check
        run: npm run monitoring:check
        env:
          DATABASE_DRIVER: postgres
          DATABASE_URL: postgres://pt_app:pt_app_password@127.0.0.1:5432/pt_resource_hub
          DATABASE_MIGRATION_URL: postgres://pt:pt_password@127.0.0.1:5432/pt_resource_hub
          PG_BACKUP_DIR: storage/postgres-backups
          BACKUP_DIR: storage/backups
          MONITORING_FAIL_ON_ALERT: "1"
          ALERT_MAX_FAILED_TASKS: "0"
          ALERT_MAX_QUEUED_TASKS: "100"
          ALERT_MAX_FAILED_SOURCES: "0"
          ALERT_MAX_BACKUP_AGE_HOURS: "24"
          ALERT_MAX_SYNC_AGE_HOURS: "24"

      - name: Stop app
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - sqlite
      - postgres
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t pt-resource-hub:ci .

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: pt-resource-hub:ci
          format: table
          severity: CRITICAL,HIGH
          exit-code: "1"

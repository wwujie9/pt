services:
  postgres:
    image: registry.cn-hangzhou.aliyuncs.com/chatwiki/postgres:20250513
    container_name: pt-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "pt_resource_hub"
      POSTGRES_USER: "pt"
      POSTGRES_PASSWORD: "pt_password"
      POSTGRES_APP_USER: "pt_app"
      POSTGRES_APP_PASSWORD: "pt_app_password"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pt -d pt_resource_hub"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - pt-postgres-data:/var/lib/postgresql/data
      - ./deploy/postgres-init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    container_name: pt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  pt-resource-hub:
    build: .
    container_name: pt-resource-hub
    restart: unless-stopped
    ports:
      - "4273:4273"
    environment:
      PORT: "4273"
      REQUIRE_AUTH: "1"
      ADMIN_EMAIL: "admin@example.local"
      ADMIN_PASSWORD: "change-me-before-demo"
      ADMIN_TOKEN: "change-me-admin-token"
      CREDENTIAL_SECRET: "change-me-credential-secret"
      TMDB_API_KEY: ""
      ENABLE_SCHEDULER: "0"
      SCHEDULER_INTERVAL_MS: "900000"
      WEBHOOK_URL: ""
      RATE_LIMIT_WINDOW_MS: "60000"
      RATE_LIMIT_MAX: "180"
      BACKUP_DIR: "storage/backups"
      LOGIN_MAX_FAILURES: "5"
      LOGIN_LOCK_MINUTES: "15"
      PUBLIC_APP_URL: "http://127.0.0.1:4273"
      EMAIL_WEBHOOK_URL: ""
      INVITE_TTL_HOURS: "72"
      PAYMENT_PROVIDER: "manual"
      DATABASE_DRIVER: "postgres"
      DATABASE_URL: "postgres://pt_app:pt_app_password@postgres:5432/pt_resource_hub"
      DATABASE_MIGRATION_URL: "postgres://pt:pt_password@postgres:5432/pt_resource_hub"
      REDIS_URL: "redis://redis:6379"
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  pt-resource-worker:
    build: .
    container_name: pt-resource-worker
    restart: unless-stopped
    command: ["npm", "run", "worker"]
    environment:
      PORT: "4273"
      REQUIRE_AUTH: "1"
      ADMIN_EMAIL: "admin@example.local"
      ADMIN_PASSWORD: "change-me-before-demo"
      ADMIN_TOKEN: "change-me-admin-token"
      CREDENTIAL_SECRET: "change-me-credential-secret"
      DATABASE_DRIVER: "postgres"
      DATABASE_URL: "postgres://pt_app:pt_app_password@postgres:5432/pt_resource_hub"
      DATABASE_MIGRATION_URL: "postgres://pt:pt_password@postgres:5432/pt_resource_hub"
      REDIS_URL: "redis://redis:6379"
      WORKER_ID: "worker-compose"
      WORKER_INTERVAL_MS: "3000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pt-postgres-data:
